{% load static %}{% if student.photo %}<img class="{{ avatar_class|default:'h-14 w-14 rounded-2xl object-cover' }}" src="{{ student.photo.url }}" alt="{{ student.full_name }}">{% else %}<span class="{{ avatar_class|default:'h-14 w-14 rounded-2xl' }} shrink-0 bg-cover" role="img" aria-label="{{ student.full_name }}" style="background-image:url('{% static 'images/student-avatars/student-avatar-atlas.webp' %}');background-position:{{ student.avatar_atlas_position }};background-size:600% 600%;background-repeat:no-repeat"></span>{% endif %}
