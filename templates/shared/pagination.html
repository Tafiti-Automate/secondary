{% if is_paginated %}<nav class="mt-6 flex items-center justify-between text-sm"><p class="text-slate-500">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</p><div class="flex gap-2">{% if page_obj.has_previous %}<a class="btn-secondary" href="?page={{ page_obj.previous_page_number }}&q={{ request.GET.q|urlencode }}">Previous</a>{% endif %}{% if page_obj.has_next %}<a class="btn-secondary" href="?page={{ page_obj.next_page_number }}&q={{ request.GET.q|urlencode }}">Next</a>{% endif %}</div></nav>{% endif %}
