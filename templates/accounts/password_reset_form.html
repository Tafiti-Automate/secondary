{% extends "accounts/auth_shell.html" %}{% block title %}Reset password{% endblock %}{% block content %}<p class="eyebrow">Account recovery</p><h1 class="mt-3 font-display text-2xl font-extrabold">Reset your password</h1><p class="mt-2 text-sm leading-6 text-slate-500">Enter the email attached to your school account. If it matches, we will send a secure reset link.</p><form method="post" class="mt-6">{% csrf_token %}<label class="label" for="{{ form.email.id_for_label }}">Email address</label><input class="form-control" type="email" name="email" autocomplete="email" required id="{{ form.email.id_for_label }}">{{ form.email.errors }}<button class="btn-primary mt-5 w-full">Send reset link</button></form>{% endblock %}
