services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: school_academics
      POSTGRES_USER: school_app
      POSTGRES_PASSWORD: change-this-password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U school_app -d school_academics"]
      interval: 10s
      timeout: 5s
      retries: 5
  web:
    build: .
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    environment:
      SECRET_KEY: replace-with-a-long-random-secret
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_ENGINE: postgresql
      DB_NAME: school_academics
      DB_USER: school_app
      DB_PASSWORD: change-this-password
      DB_HOST: db
      SECURE_SSL_REDIRECT: "False"
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
volumes:
  postgres_data:
  media_data:
